name: Update MSTR signals

on:
  schedule:
    # every 30 min
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-signals
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch signals
        run: python scripts/fetch_signals.py

      - name: Commit data updates
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "data: refresh signals $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "::warning::DISCORD_WEBHOOK_URL secret not set; skipping Discord notify."
            exit 0
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          PAYLOAD=$(cat <<EOF
          {
            "username": "MSTR Dashboard",
            "embeds": [{
              "title": "❌ MSTR signals workflow failed",
              "url": "$RUN_URL",
              "color": 15158332,
              "fields": [
                {"name": "Repo",     "value": "${{ github.repository }}",       "inline": true},
                {"name": "Workflow", "value": "${{ github.workflow }}",         "inline": true},
                {"name": "Run",      "value": "[#${{ github.run_number }}]($RUN_URL)", "inline": true},
                {"name": "Trigger",  "value": "${{ github.event_name }}",       "inline": true},
                {"name": "Branch",   "value": "${{ github.ref_name }}",         "inline": true},
                {"name": "SHA",      "value": "\`${{ github.sha }}\`",          "inline": true}
              ],
              "timestamp": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            }]
          }
          EOF
          )
          curl -s -H "Content-Type: application/json" -X POST -d "$PAYLOAD" "$DISCORD_WEBHOOK_URL"
